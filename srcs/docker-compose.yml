services:

  mariadb:
    build: ./requirements/mariadb
    volumes:
      - db_volume:/var/lib/mysql
    networks:
      - inception

  wordpress:
    build: ./requirements/wordpress
    volumes:
      - wp_volume:/var/www/html
    networks:
      - inception
    depends_on:
      - mariadb

  nginx:
    build: ./requirements/nginx
    ports:
      - "443:443"
    volumes:
      - wp_volume:/var/www/html
    networks:
      - inception
    depends_on:
      - wordpress

networks:
  inception:

volumes:
  db_volume:
  wp_volume: